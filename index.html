<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout App</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0b0b0f;
  color: white;
}

.container {
  padding: 16px;
}

h1 { text-align: center; }

/* INPUT */
select, input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  margin-bottom: 8px;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 8px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #1c1c24;
  color: white;
}

.primary {
  background: #4cafef;
  color: black;
  font-weight: bold;
}

.exercise {
  text-align: center;
  font-size: 26px;
  margin: 20px 0;
}

.timer {
  text-align: center;
  font-size: 42px;
  margin: 10px 0;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.rest-buttons {
  display: flex;
  gap: 10px;
}

.rest-buttons button {
  flex: 1;
}

/* HISTORY */
.history {
  margin-top: 20px;
  background: #1a1a22;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Workout Builder</h1>

<select id="exerciseSelect">
  <option value="">-- Select Exercise --</option>
  <option>Push Ups</option>
  <option>Bench Press</option>
  <option>Squats</option>
  <option>Deadlift</option>
  <option>Pull Ups</option>
  <option>Shoulder Press</option>
</select>

<button onclick="addFromDropdown()">Add</button>

<input id="manualInput" placeholder="Custom exercise...">
<button onclick="addManual()">Add Custom</button>

<button class="primary" onclick="startWorkout()">Start Workout</button>

<div id="workoutScreen" style="display:none;">

  <div class="exercise" id="exerciseName"></div>
  <div class="timer" id="timer">0</div>

  <div class="controls">
    <button onclick="prev()">⬅</button>
    <button onclick="next()">➡</button>
    <button class="primary" onclick="startRest(60)">Rest</button>
    <button onclick="skipRest()">Skip</button>
  </div>

  <div class="rest-buttons">
    <button onclick="startRest(60)">60s</button>
    <button onclick="startRest(90)">90s</button>
    <button onclick="startRest(120)">120s</button>
  </div>

  <button onclick="finishWorkout()">Finish Workout</button>

</div>

<div class="history">
  <h3>History</h3>
  <ul id="historyList"></ul>
</div>

</div>

<script>
let exercises = JSON.parse(localStorage.getItem("exercises")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

let index = 0;
let restInterval = null;
let timeLeft = 0;

/* ADD */
function addFromDropdown() {
  const val = exerciseSelect.value;
  if (val) {
    exercises.push(val);
    saveExercises();
    alert("Added: " + val);
  }
}

function addManual() {
  const val = manualInput.value.trim();
  if (val) {
    exercises.push(val);
    manualInput.value = "";
    saveExercises();
    alert("Added: " + val);
  }
}

function saveExercises() {
  localStorage.setItem("exercises", JSON.stringify(exercises));
}

/* START */
function startWorkout() {
  if (exercises.length === 0) {
    alert("Add exercises first");
    return;
  }

  document.getElementById("workoutScreen").style.display = "block";
  updateUI();
}

/* UI */
function updateUI() {
  document.getElementById("exerciseName").innerText = exercises[index];
}

/* NAV */
function next() {
  index = (index + 1) % exercises.length;
  updateUI();
}

function prev() {
  index = (index - 1 + exercises.length) % exercises.length;
  updateUI();
}

/* REST FIXED */
function startRest(seconds) {
  clearInterval(restInterval);

  timeLeft = seconds;
  updateTimer();

  restInterval = setInterval(() => {
    if (timeLeft > 0) {
      timeLeft--;
      updateTimer();
    } else {
      clearInterval(restInterval);
      alert("Rest done!");
      if (navigator.vibrate) navigator.vibrate(300);
    }
  }, 1000);
}

function skipRest() {
  clearInterval(restInterval);
  timeLeft = 0;
  updateTimer();
}

function updateTimer() {
  document.getElementById("timer").innerText = timeLeft;
}

/* FINISH + SAVE HISTORY */
function finishWorkout() {
  const date = new Date().toLocaleString();

  history.push({
    date,
    exercises: [...exercises]
  });

  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();

  alert("Workout saved!");
}

/* HISTORY UI */
function renderHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  history.slice().reverse().forEach(item => {
    const li = document.createElement("li");
    li.innerText = item.date + " (" + item.exercises.length + " exercises)";
    list.appendChild(li);
  });
}

renderHistory();

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX - startX > 50) prev();
  if (startX - endX > 50) next();
});
</script>

</body>
</html>
