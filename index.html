<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTracker AI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0f172a;
  --accent:#22c55e;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:var(--text);
}

/* HEADER */
.app-header{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  padding:16px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.app-header span{color:#22c55e;font-weight:600;}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:16px;
  padding-bottom:120px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:18px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(145deg,#22c55e,#16a34a);
  color:white;
  font-weight:600;
  letter-spacing:0.5px;
  box-shadow:0 6px 15px rgba(34,197,94,0.35);
  transition:0.2s;
  margin-top:8px;
}

button:active{
  transform:scale(0.97);
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.08);
  color:white;
  margin-top:6px;
}

/* SET */
.set{
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  margin-top:6px;
}

.timer{font-size:40px;text-align:center;font-weight:bold;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  background:rgba(10,10,10,0.9);
  backdrop-filter:blur(10px);
}

.nav button{
  flex:1;
  background:none;
  color:#777;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.nav button.active{color:#22c55e;}
.equipment-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

.equip-item {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 12px;
  border-radius: 12px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.05);
}

/* Bigger, cleaner checkbox */
.equip-item input {
  width: 18px;
  height: 18px;
  accent-color: #22c55e;
}
/* FAB */
.fab{
  position:fixed;
  bottom:110px;
  left:50%;
  transform:translateX(-50%);
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:30px;
  background:linear-gradient(145deg,#22c55e,#16a34a);
}

/* SCREENS */
.screen{display:none;}
.activeScreen{display:block;}
</style>
</head>

<body>

<div class="app-header">
  <h1>GymTracker</h1>
  <span>AI Pro</span>
</div>

<div class="container">

<div id="workout" class="screen activeScreen">

<div class="card">
<h2>Smart Workout</h2>

<div class="equipment-list">
  <label class="equip-item">
    <span>Barbell</span>
    <input type="checkbox" value="Barbell">
  </label>

  <label class="equip-item">
    <span>Dumbbell</span>
    <input type="checkbox" value="Dumbbell">
  </label>

  <label class="equip-item">
    <span>Machine</span>
    <input type="checkbox" value="Machine">
  </label>

  <label class="equip-item">
    <span>Cable</span>
    <input type="checkbox" value="Cable">
  </label>

  <label class="equip-item">
    <span>Bodyweight</span>
    <input type="checkbox" value="Bodyweight">
  </label>
</div>

<button onclick="generateSmartWorkout()">Generate Workout</button>
</div>

<div class="card">
<select id="exercise"></select>
<input id="reps" type="number" placeholder="Reps">
<input id="weight" type="number" placeholder="Weight">
<button onclick="addSet()">Log Set</button>
</div>

<div class="card"><h3>Sets</h3><div id="sets"></div></div>
<div class="card"><h3>Next Set</h3><div id="nextSet">---</div></div>

<div class="card">
<h3>Rest Timer</h3>
<div id="timer" class="timer">01:30</div>
<button onclick="startTimer()">Start</button>
</div>

<button onclick="saveWorkout()">Finish Workout</button>

</div>

<div id="progress" class="screen">
<div class="card"><canvas id="chart"></canvas></div>
</div>

<div id="muscles" class="screen">
<div class="card"><div id="muscleStats"></div></div>
</div>

<div id="historyScreen" class="screen">
<div class="card"><div id="historyList"></div></div>
</div>

</div>

<div class="nav">
<button class="active" onclick="showTab('workout',this)">🏋️<span>Workout</span></button>
<button onclick="showTab('progress',this)">📈<span>Progress</span></button>
<button onclick="showTab('muscles',this)">💪<span>Muscles</span></button>
<button onclick="showTab('historyScreen',this)">🗂️<span>History</span></button>
</div>

<button class="fab" onclick="addSet()">+</button>

<script>
const exerciseDB=[
{name:"Bench Press",muscle:"Chest",equipment:"Barbell"},
{name:"Pull Up",muscle:"Back",equipment:"Bodyweight"},
{name:"Squat",muscle:"Legs",equipment:"Barbell"},
{name:"Shoulder Press",muscle:"Shoulders",equipment:"Dumbbell"},
{name:"Bicep Curl",muscle:"Arms",equipment:"Dumbbell"}
];

let history=JSON.parse(localStorage.getItem("history"))||[];
let workouts=JSON.parse(localStorage.getItem("workouts"))||[];
let setList=[];

let restTime=90,current=restTime,restInterval;

function generateSmartWorkout(){
let checked=[...document.querySelectorAll('input:checked')].map(c=>c.value);
let list=exerciseDB.filter(e=>checked.includes(e.equipment));
exercise.innerHTML="";
list.forEach(e=>{
let o=document.createElement("option");
o.textContent=e.name;
exercise.appendChild(o);
});
}

function addSet(){
let r=+reps.value,w=+weight.value;
if(!r||!w)return;
setList.push({reps:r,weight:w});
renderSets();
history.push({exercise:exercise.value,reps:r,weight:w});
localStorage.setItem("history",JSON.stringify(history));
resetTimer();startTimer();
reps.value="";weight.value="";
}

function renderSets(){
sets.innerHTML="";
setList.forEach((s,i)=>{
sets.innerHTML+=`<div class="set"><span>${i+1}</span><span>${s.reps}</span><span>${s.weight}</span></div>`;
});
}

function startTimer(){
clearInterval(restInterval);
restInterval=setInterval(()=>{
current--;updateTimer();
if(current<=0){clearInterval(restInterval);alert("Next Set");}
},1000);
}

function resetTimer(){clearInterval(restInterval);current=restTime;updateTimer();}
function updateTimer(){timer.innerText=`${Math.floor(current/60)}:${(current%60).toString().padStart(2,'0')}`;}

function saveWorkout(){
workouts.push({exercise:exercise.value,sets:setList});
localStorage.setItem("workouts",JSON.stringify(workouts));
setList=[];renderSets();alert("Saved");
}

function showTab(id,btn){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('activeScreen'));
document.getElementById(id).classList.add('activeScreen');
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

updateTimer();
</script>

</body>
</html>
