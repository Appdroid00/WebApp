<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout App</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #0b0b0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 20px;
    }

    .exercise {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-align: center;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 18px;
      font-size: 18px;
      border-radius: 14px;
      border: none;
      background: #1c1c24;
      color: white;
    }

    button:active {
      transform: scale(0.96);
    }

    .primary {
      background: #4cafef;
      color: black;
      font-weight: bold;
    }

    .rest-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .rest-buttons button {
      flex: 1;
      background: #2a2a33;
    }

    .timer {
      text-align: center;
      font-size: 40px;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Workout</h1>

  <div class="exercise" id="exercise">Push Ups</div>

  <div class="timer" id="timer">0</div>

  <div class="controls">
    <button onclick="prev()">⬅ Prev</button>
    <button onclick="next()">Next ➡</button>
    <button class="primary" onclick="startRest(60)">Rest</button>
    <button onclick="skipRest()">Skip</button>
  </div>

  <div class="rest-buttons">
    <button onclick="startRest(60)">60s</button>
    <button onclick="startRest(90)">90s</button>
    <button onclick="startRest(120)">120s</button>
  </div>
</div>

<script>
let exercises = [
  "Push Ups",
  "Bench Press",
  "Shoulder Press",
  "Squats",
  "Deadlift"
];

let index = 0;
let restInterval = null;
let timeLeft = 0;

function updateUI() {
  document.getElementById("exercise").innerText = exercises[index];
}

function next() {
  index = (index + 1) % exercises.length;
  updateUI();
}

function prev() {
  index = (index - 1 + exercises.length) % exercises.length;
  updateUI();
}

function startRest(seconds) {
  clearInterval(restInterval);
  timeLeft = seconds;
  updateTimer();

  restInterval = setInterval(() => {
    timeLeft--;
    updateTimer();

    if (timeLeft <= 0) {
      clearInterval(restInterval);
      alert("Rest done!");
      vibrate();
    }
  }, 1000);
}

function skipRest() {
  clearInterval(restInterval);
  document.getElementById("timer").innerText = "0";
}

function updateTimer() {
  document.getElementById("timer").innerText = timeLeft;
}

function vibrate() {
  if (navigator.vibrate) {
    navigator.vibrate(500);
  }
}

// Swipe support
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (endX - startX > 50) prev();
  if (startX - endX > 50) next();
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

updateUI();
</script>

</body>
</html>
