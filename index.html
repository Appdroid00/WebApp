<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTracker AI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:16px;
  padding-bottom:120px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:none;
}

.fab{
  position:fixed;
  bottom:100px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:28px;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen" class="card">
<h2>Login</h2>
<button onclick="login()">Login with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<select id="exercise">
<option>Bench Press</option>
<option>Squat</option>
<option>Deadlift</option>
</select>

<input id="reps" placeholder="Reps">
<input id="weight" placeholder="Weight">

<button onclick="addSet()">Add Set</button>
</div>

<div class="card">
<h3>Sets</h3>
<div id="sets"></div>
</div>

<button onclick="saveWorkout()">Save Workout</button>

</div>

</div>

<button class="fab" onclick="addSet()">+</button>

<!-- ✅ FIREBASE (CORRECT MODULE VERSION) -->
<script type="module">

// ✅ IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 PASTE YOUR CONFIG HERE
const firebaseConfig = {
    apiKey: "AIzaSyACiN9JF2EXiGv2oBVor1zdh7TTu3GsuDs",
    authDomain: "gymtracker-5818e.firebaseapp.com",
    projectId: "gymtracker-5818e",
    storageBucket: "gymtracker-5818e.firebasestorage.app",
    messagingSenderId: "95959734615",
    appId: "1:95959734615:web:7de4ddfa499dd0cf1f8612",
    measurementId: "G-7NMX853H5T"
  };

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user = null;
let setList = [];

// LOGIN
window.login = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// AUTH STATE
onAuthStateChanged(auth, (u)=>{
  if(u){
    user = u;
    loginScreen.style.display="none";
    app.style.display="block";
  }
});

// ADD SET
window.addSet = function(){
  let r = reps.value;
  let w = weight.value;
  if(!r || !w) return;

  setList.push({reps:r,weight:w});
  renderSets();

  reps.value="";
  weight.value="";
};

// RENDER
function renderSets(){
  sets.innerHTML="";
  setList.forEach((s,i)=>{
    sets.innerHTML += `<div>Set ${i+1}: ${s.reps} reps ${s.weight}kg</div>`;
  });
}

// SAVE TO FIREBASE
window.saveWorkout = async function(){
  if(!user){
    alert("Login first");
    return;
  }

  await addDoc(collection(db,"workouts"),{
    user:user.uid,
    exercise:exercise.value,
    sets:setList,
    date:Date.now()
  });

  alert("Saved to cloud ✅");

  setList=[];
  renderSets();
};

</script>

</body>
</html>
